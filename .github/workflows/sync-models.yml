name: Sync LLM Models & Pricing

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      timeout:
        description: 'Per-provider timeout (seconds)'
        required: false
        default: '15'

# No contents:write needed — we don't push to this public repo
# Output goes only to the private data repo
permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Validate PROVIDERS_JSON
        env:
          PROVIDERS_JSON_VALIDATE: ${{ secrets.PROVIDERS_JSON }}
        run: |
          if [ -z "$PROVIDERS_JSON_VALIDATE" ]; then
            echo "::error::PROVIDERS_JSON secret is not set"
            exit 1
          fi

      - name: Sync models & pricing
        env:
          PROVIDERS_JSON: ${{ secrets.PROVIDERS_JSON }}
          PROVIDER_TIMEOUT: ${{ github.event.inputs.timeout || '15' }}
          DATA_DIR: data
        run: python scripts/sync_models.py

      - name: Verify no secrets in output
        run: |
          for f in data/models.json data/pricing.json data/pricing-changes.json; do
            if grep -qE '(sk-|gsk_|nvapi-|blz_|AIza|lfu_|sta_|vc-|csk-)' "$f" 2>/dev/null; then
              echo "::error::Secret key pattern found in $f"
              exit 1
            fi
          done
          echo "Output files verified: no secrets leaked"

      - name: Push to private data repo
        env:
          PRIVATE_DATA_PAT: ${{ secrets.PRIVATE_DATA_PAT }}
          PRIVATE_DATA_REPO: ${{ secrets.PRIVATE_DATA_REPO }}
        run: |
          if [ -z "$PRIVATE_DATA_REPO" ] || [ -z "$PRIVATE_DATA_PAT" ]; then
            echo "PRIVATE_DATA_REPO or PRIVATE_DATA_PAT not set, skipping"
            exit 0
          fi
          CLONE_URL="https://x-access-token:${PRIVATE_DATA_PAT}@github.com/${PRIVATE_DATA_REPO}.git"
          TMPDIR=$(mktemp -d)
          git clone "$CLONE_URL" "$TMPDIR/repo" --depth 1 2>/dev/null || {
            echo "Could not clone private repo, creating fresh"
            mkdir -p "$TMPDIR/repo"
            cd "$TMPDIR/repo"
            git init
            git remote add origin "$CLONE_URL"
          }
          cd "$TMPDIR/repo"
          mkdir -p data
          cp "${{ github.workspace }}/data/models.json" data/
          cp "${{ github.workspace }}/data/pricing.json" data/ 2>/dev/null || true
          cp "${{ github.workspace }}/data/pricing-changes.json" data/ 2>/dev/null || true
          git add -f data/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No changes to push to private repo"
          else
            git commit -m "sync: update model catalog $(date -u +%Y-%m-%d)"
            git push
          fi
          rm -rf "$TMPDIR"
