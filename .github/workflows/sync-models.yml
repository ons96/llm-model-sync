name: Sync LLM Models & Pricing

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      timeout:
        description: 'Per-provider timeout (seconds)'
        required: false
        default: '15'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install aiohttp

      - name: Validate PROVIDERS_JSON
        run: |
          if [ -z "${{ secrets.PROVIDERS_JSON }}" ]; then
            echo "::error::PROVIDERS_JSON secret is not set. Add it in Settings > Secrets."
            exit 1
          fi

      - name: Sync models & pricing
        env:
          PROVIDERS_JSON: ${{ secrets.PROVIDERS_JSON }}
          PROVIDER_TIMEOUT: ${{ github.event.inputs.timeout || '15' }}
          DATA_DIR: data
        run: python scripts/sync_models.py

      - name: Check for pricing changes
        id: changes
        run: |
          change_count=$(python3 -c "import json; print(len(json.load(open('data/pricing-changes.json'))))" 2>/dev/null || echo "0")
          echo "count=$change_count" >> "$GITHUB_OUTPUT"
          echo "Pricing changes: $change_count"

      - name: Verify no secrets in output
        run: |
          for f in data/models.json data/pricing.json data/pricing-changes.json; do
            if grep -qE '(sk-|gsk_|nvapi-|blz_|AIza|lfu_|sta_|vc-|csk-)' "$f" 2>/dev/null; then
              echo "::error::Secret key pattern found in $f — aborting commit"
              exit 1
            fi
          done
          echo "Output files verified: no secrets leaked"

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/models.json data/pricing.json data/pricing-changes.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update model catalog and pricing data"
            git push
          fi

      - name: Push to private data repo
        if: success() && secrets.PRIVATE_DATA_PAT != ''
        continue-on-error: true
        env:
          PRIVATE_DATA_PAT: ${{ secrets.PRIVATE_DATA_PAT }}
          PRIVATE_DATA_REPO: ${{ secrets.PRIVATE_DATA_REPO }}
        run: |
          if [ -z "$PRIVATE_DATA_REPO" ]; then
            echo "PRIVATE_DATA_REPO secret not set, skipping"
            exit 0
          fi
          CLONE_URL="https://x-access-token:${PRIVATE_DATA_PAT}@github.com/${PRIVATE_DATA_REPO}.git"
          TMPDIR=$(mktemp -d)
          git clone "$CLONE_URL" "$TMPDIR/repo" --depth 1 2>/dev/null || {
            echo "Could not clone private repo, creating fresh"
            mkdir -p "$TMPDIR/repo"
            cd "$TMPDIR/repo"
            git init
            git remote add origin "$CLONE_URL"
          }
          cd "$TMPDIR/repo"
          mkdir -p data
          cp "${{ github.workspace }}/data/models.json" data/
          cp "${{ github.workspace }}/data/pricing.json" data/ 2>/dev/null || true
          cp "${{ github.workspace }}/data/pricing-changes.json" data/ 2>/dev/null || true
          git add data/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --cached --quiet; then
            echo "No changes to push to private repo"
          else
            git commit -m "sync: update model catalog $(date -u +%Y-%m-%d)"
            git push
          fi
          rm -rf "$TMPDIR"

      - name: Trigger VPS sync
        if: success()
        uses: peter-evans/repository-dispatch@v3
        continue-on-error: true
        with:
          token: ${{ secrets.VPS_SYNC_PAT }}
          repository: ${{ github.repository }}
          event-type: vps-sync
          client-payload: '{"run_id": "${{ github.run_id }}"}'

      - name: Alert on free-to-paid changes
        if: steps.changes.outputs.count != '0'
        uses: peter-evans/create-or-update-comment@v4
        continue-on-error: true
        with:
          token: ${{ secrets.VPS_SYNC_PAT }}
          repository: ${{ github.repository }}
          issue-number: 1
          body: |
            :warning: **Free-to-Paid Model Changes Detected**

            ${{ steps.changes.outputs.count }} model(s) that were previously free now have pricing.

            See [run ${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.
